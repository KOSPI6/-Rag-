<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent Graph 监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/graph_monitor.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 RAG Agent Graph 实时监控</h1>
            <p class="subtitle">实时追踪 LangGraph 执行流程</p>
        </header>

        <div class="main-layout">
            <!-- 左侧：聊天区域 -->
            <div class="chat-section resizable" id="chatSection">
                <div class="section-header">
                    <h2>💬 对话区</h2>
                    <button class="collapse-btn" onclick="toggleSection('chatSection')" title="折叠/展开">−</button>
                </div>

                <div class="section-content">
                    <div id="chatMessages" class="chat-messages"></div>

                    <div class="input-container">
                        <textarea
                            id="questionInput"
                            placeholder="请输入您的问题..."
                            rows="2"
                        ></textarea>
                        <button id="sendBtn" onclick="sendMessage()">
                            <span id="btnText">发送</span>
                            <span id="btnLoader" class="loader" style="display: none;"></span>
                        </button>
                    </div>
                </div>

                <div class="resize-handle" data-direction="right"></div>
            </div>

            <!-- 右侧：Graph 可视化 -->
            <div class="graph-section">
                <!-- Graph 流程图 -->
                <div class="graph-panel resizable" id="graphPanel">
                    <div class="section-header">
                        <h2>🔄 执行流程</h2>
                        <div class="header-actions">
                            <div class="status-badge" id="statusBadge">就绪</div>
                            <button class="collapse-btn" onclick="toggleSection('graphPanel')" title="折叠/展开">−</button>
                        </div>
                    </div>

                    <div class="section-content">
                        <div class="graph-container">
                            <svg id="graphSvg" width="100%" height="600"></svg>
                        </div>
                    </div>

                    <div class="resize-handle" data-direction="bottom"></div>
                </div>

                <!-- 底部面板容器 -->
                <div class="bottom-panels">
                    <!-- 时间线面板 -->
                    <div class="timeline-panel resizable" id="timelinePanel">
                        <div class="section-header">
                            <h2>⏱️ 执行时间线</h2>
                            <button class="collapse-btn" onclick="toggleSection('timelinePanel')" title="折叠/展开">−</button>
                        </div>

                        <div class="section-content">
                            <div id="timeline" class="timeline"></div>
                        </div>

                        <div class="resize-handle" data-direction="right"></div>
                    </div>

                    <!-- 节点详情面板 -->
                    <div class="details-panel resizable" id="detailsPanel">
                        <div class="section-header">
                            <h2>📊 节点详情</h2>
                            <button class="collapse-btn" onclick="toggleSection('detailsPanel')" title="折叠/展开">−</button>
                        </div>

                        <div class="section-content">
                            <div id="nodeDetails" class="node-details">
                                <p class="placeholder">点击节点查看详细信息</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/graph_monitor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/resizable.js') }}"></script>
</body>
</html>
